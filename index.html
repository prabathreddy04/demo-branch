<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello World</title>
  <style>
    .enhanced-badge {
      position: fixed;
      top: 10px;
      right: 10px;
      background-color: #4ade80;
      color: #000;
      padding: 5px 10px;
      border-radius: 5px;
      font-size: 12px;
      font-weight: bold;
      z-index: 1000;
    }
    body {
      background: linear-gradient(to bottom, white, black);
      color: #ffffff;
      font-family: Arial, sans-serif;
      margin: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 0.5em;
    }
    p {
      font-size: 1.1em;
      max-width: 500px;
      text-align: center;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="enhanced-badge">ENHANCED</div>
  <h1>Hello, world!</h1>
  <p>
    Welcome to your minimal single-page application. This page demonstrates a simple HTML structure styled with clean, readable formatting using inline CSS.
  </p>
</body>
</html>
